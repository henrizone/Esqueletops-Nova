services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: esqueletops
      POSTGRES_USER: esqueletops
      POSTGRES_PASSWORD: troque-esta-senha
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esqueletops -d esqueletops"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "troque-esta-senha"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "troque-esta-senha", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://esqueletops:troque-esta-senha@postgres:5432/esqueletops
      REDIS_URL: redis://default:troque-esta-senha@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
